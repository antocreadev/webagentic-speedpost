[project]
name = "lescontesinfuses-backend"
version = "0.1.0"
description = "Backend FastAPI pour Les Contes Infusés (librairie-café Corte)"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "sqlalchemy>=2.0",
    "aiosqlite>=0.19",
    "alembic>=1.13",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "email-validator>=2.1",
    "python-jose[cryptography]>=3.3",
    "bcrypt>=4.1",
    "passlib[bcrypt]>=1.7",
    "slowapi>=0.1.9",
    "python-multipart>=0.0.9",
    "fastapi-mail>=1.4",
    "reportlab>=4.1",
    "httpx>=0.27",
    "asyncpg>=0.29",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "anyio>=4.3",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["app*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
